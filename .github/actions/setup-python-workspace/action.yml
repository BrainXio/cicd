name: Setup Python Workspace
description: Encapsulate common Python workspace setup with conditional uv sync

inputs:
  python-version:
    description: "Python version"
    required: true
    type: string
  extra-deps:
    description: "Extra uv sync dependency groups (comma-separated)"
    required: false
    type: string
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: brainxio/actions/common-setup@v1
      with:
        language: python
        version: ${{ inputs.python-version }}

    - name: Sync dependencies
      if: ${{ inputs.extra-deps != '' }}
      shell: bash
      env:
        EXTRA_DEPS: ${{ inputs.extra-deps }}
      run: |
        set -euo pipefail
        uv sync --extra "$EXTRA_DEPS"

    - name: Sync base dependencies
      if: ${{ inputs.extra-deps == '' }}
      shell: bash
      run: |
        set -euo pipefail
        uv sync
