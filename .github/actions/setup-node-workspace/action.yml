name: Setup Node Workspace
description: Encapsulate common Node workspace setup with package manager validation

inputs:
  node-version:
    description: "Node.js version"
    required: true
    type: string
  package-manager:
    description: "Package manager: npm, pnpm, or yarn"
    required: false
    type: string
    default: "npm"
  registry-url:
    description: "npm registry URL"
    required: false
    type: string
    default: ""
  scope:
    description: "npm scope"
    required: false
    type: string
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}

    - name: Validate package manager
      shell: bash
      env:
        PM: ${{ inputs.package-manager }}
      run: |
        set -euo pipefail
        case "$PM" in
          npm|pnpm|yarn) ;;
          *) echo "ERROR: unsupported package manager: $PM" >&2; exit 1 ;;
        esac
