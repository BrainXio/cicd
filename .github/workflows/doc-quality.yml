name: Doc Quality
# === Consumer reusable workflow ===
# Always call via: uses: brainxio/cicd/.github/workflows/doc-quality.yml@v1
# Do NOT copy the file unless you intend to fork.

on:
  workflow_call:
    inputs:
      md-paths:
        description: "Paths/globs for mdformat (space-separated)"
        type: string
        default: "."
      yaml-paths:
        description: "Paths for yamllint"
        type: string
        default: ".github"
      yamllint-config:
        description: "Path to yamllint config (empty for auto-discovery)"
        type: string
        default: ""
      typos-config:
        description: "Path to .typos.toml (empty to skip typos check)"
        type: string
        default: ""
      link-check-paths:
        description: "Paths for lychee link check (empty to skip)"
        type: string
        default: ""
      link-check-base:
        description: "Base path for relative link resolution"
        type: string
        default: "."
      link-check-fail:
        description: "Fail workflow on broken links"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  doc-lint:
    name: Lint and Format Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true

      - name: Run mdformat check
        shell: bash
        env:
          MD_PATHS: ${{ inputs.md-paths }}
        run: |
          set -euo pipefail
          uv run --with mdformat --with mdformat-frontmatter --with mdformat-gfm mdformat --check $MD_PATHS

      - name: Run yamllint
        shell: bash
        env:
          YAML_PATHS: ${{ inputs.yaml-paths }}
          YAMLLINT_CONFIG: ${{ inputs.yamllint-config }}
        run: |
          set -euo pipefail
          if [ -n "$YAMLLINT_CONFIG" ]; then
            uv run --with yamllint yamllint -c "$YAMLLINT_CONFIG" $YAML_PATHS
          else
            uv run --with yamllint yamllint $YAML_PATHS
          fi

  typos:
    name: Spell Check
    if: ${{ inputs.typos-config != '' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: crate-ci/typos@d80b8e26878e372a041833cd67163dbdb6a4336e
        with:
          config: ${{ inputs.typos-config }}

  link-check:
    name: Link Check
    if: ${{ inputs.link-check-paths != '' }}
    runs-on: ubuntu-24.04
    continue-on-error: ${{ !inputs.link-check-fail }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: --base ${{ inputs.link-check-base }} ${{ inputs.link-check-paths }}
          fail: ${{ inputs.link-check-fail }}
          failIfEmpty: false
