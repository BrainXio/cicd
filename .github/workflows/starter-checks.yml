name: Starter Checks
# === Consumer reusable workflow ===
# Always call via: uses: brainxio/cicd/.github/workflows/starter-checks.yml@v1
# Do NOT copy the file unless you intend to fork.

on:
  workflow_call:
    inputs:
      check-commit-messages:
        description: "Validate conventional commit messages"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: trufflesecurity/trufflehog@0ec3634f6cf66a61912a923fee9d20cc45633a67 # v3.88.0
        with:
          extra_args: --only-verified

  merge-conflicts:
    name: Merge Conflict Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Scan for unresolved merge conflict markers
        shell: bash
        run: |
          conflicts=$(git grep -lE '^(<<<<<<< |>>>>>>> |=======$)' \\
            -- '*.py' '*.ts' '*.tsx' '*.rs' '*.go' '*.yml' '*.yaml' \\
            '*.md' '*.toml' '*.json' '*.sh' '*.bash' '*.css' '*.html' \\
            '*.tf' '*.hcl' '*.sql' '*.xml' 2>/dev/null || true)
          if [ -n "$conflicts" ]; then
            echo "ERROR: merge conflict markers found:"
            echo "$conflicts"
            exit 1
          fi
          echo "No merge conflicts found"

  commitlint:
    name: Commit Message Check
    if: ${{ inputs.check-commit-messages }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for common ancestor
        id: common-ancestor
        shell: bash
        run: |
          # Skip commitlint if before SHA is all zeros (new branch/repo)
          if [ "$GITHUB_EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "No common ancestor: before SHA is all zeros (force-pushed new root)"
            exit 0
          fi

          # Check if before and after SHAs have a common ancestor
          if git merge-base --is-ancestor "$GITHUB_EVENT_BEFORE" "$GITHUB_EVENT_AFTER" 2>/dev/null; then
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          else
            # No common ancestor - skip commitlint check
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "No common ancestor between $GITHUB_EVENT_BEFORE and $GITHUB_EVENT_AFTER - skipping commitlint"
          fi

      - name: Commitlint
        if: steps.common-ancestor.outputs.skipped != 'true'
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          failOnWarnings: true
          helpURL: ""
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}

  diffstat-gate:
    name: Scope Creep Diffstat Gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Diffstat gate
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'scope-creep-approved') }}
        run: |
          base_ref="${{ github.base_ref }}"
          if [ -z "$base_ref" ]; then
            echo "Not a PR event; skipping diffstat gate"
            exit 0
          fi

          git fetch origin "$base_ref" --depth=1
          stats=$(git diff --stat origin/"$base_ref"..HEAD | tail -1)

          files_changed=$(echo "$stats" | sed -n 's/.* \([0-9]\+\) file.*/\1/p')
          [ -z "$files_changed" ] && files_changed=0

          insertions=$(echo "$stats" | sed -n 's/.* \([0-9]\+\) insertion.*/\1/p')
          [ -z "$insertions" ] && insertions=0

          deletions=$(echo "$stats" | sed -n 's/.* \([0-9]\+\) deletion.*/\1/p')
          [ -z "$deletions" ] && deletions=0

          total_lines=$((insertions + deletions))

          echo "Diffstat: $files_changed files changed, $total_lines lines changed ($insertions insertions, $deletions deletions)"

          if [ "$files_changed" -gt 5 ] || [ "$total_lines" -gt 500 ]; then
            echo "ERROR: Diffstat exceeds limits (max 5 files, 500 lines)."
            echo "Add the 'scope-creep-approved' label to override."
            exit 1
          fi

          echo "Diffstat within limits."
