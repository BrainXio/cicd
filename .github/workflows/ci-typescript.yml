name: TypeScript CI
# === Consumer reusable workflow ===
# Always call via: uses: brainxio/cicd/.github/workflows/ci-typescript.yml@v1
# Do NOT copy the file unless you intend to fork.

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "22"
      package-manager:
        description: "Package manager: npm, pnpm, or yarn"
        type: string
        default: "npm"
      lint-script:
        description: "package.json lint script name"
        type: string
        default: "lint"
      format-script:
        description: "package.json format check script name"
        type: string
        default: "format:check"
      typecheck-script:
        description: "package.json typecheck script name"
        type: string
        default: "typecheck"
      test-script:
        description: "package.json test script name"
        type: string
        default: "test"
      build-script:
        description: "package.json build script name"
        type: string
        default: "build"

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-24.04
    steps:
      - uses: brainxio/actions/common-setup@v1
        with:
          language: node
          version: ${{ inputs.node-version }}

      - name: Run lint
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          LINT_SCRIPT: ${{ inputs.lint-script }}
        run: |
          set -euo pipefail
          $PACKAGE_MANAGER run $LINT_SCRIPT

      - name: Run format check
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          FORMAT_SCRIPT: ${{ inputs.format-script }}
        run: |
          set -euo pipefail
          $PACKAGE_MANAGER run $FORMAT_SCRIPT

  typecheck:
    name: Type Check
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: brainxio/actions/common-setup@v1
        with:
          language: node
          version: ${{ inputs.node-version }}

      - name: Run typecheck
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          TYPECHECK_SCRIPT: ${{ inputs.typecheck-script }}
        run: |
          set -euo pipefail
          $PACKAGE_MANAGER run $TYPECHECK_SCRIPT

  test:
    name: Test
    needs: typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: brainxio/actions/common-setup@v1
        with:
          language: node
          version: ${{ inputs.node-version }}

      - name: Run tests
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          TEST_SCRIPT: ${{ inputs.test-script }}
        run: |
          set -euo pipefail
          $PACKAGE_MANAGER run $TEST_SCRIPT

  build:
    name: Build
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: brainxio/actions/common-setup@v1
        with:
          language: node
          version: ${{ inputs.node-version }}

      - name: Run build
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          BUILD_SCRIPT: ${{ inputs.build-script }}
        run: |
          set -euo pipefail
          $PACKAGE_MANAGER run $BUILD_SCRIPT
