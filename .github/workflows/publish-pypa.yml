name: Publish Python Package
# === Consumer reusable workflow ===
# Always call via: uses: brainxio/cicd/.github/workflows/publish-pypa.yml@v1
# Do NOT copy the file unless you intend to fork.

on:
  workflow_call:
    inputs:
      attestations:
        description: "Enable PEP 740 attestations"
        type: string
        default: "false"
      repository-url:
        description: "Package registry URL. Default GitHub Packages (uses GITHUB_TOKEN). For pypi.org use https://upload.pypi.org/legacy/ and provide PYPI_API_TOKEN secret."
        type: string
        default: "https://pypi.pkg.github.com/${{ github.repository_owner }}"
    secrets:
      PYPI_API_TOKEN:
        description: "PyPI API token. Required for pypi.org or test.pypi.org. Omit for GitHub Packages."
        required: false

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: uv sync

      - name: Build package
        run: uv run python -m build

      - name: Publish to registry
        # Token contract:
        #   - GitHub Packages (default URL)  → GITHUB_TOKEN is sufficient.
        #   - pypi.org / test.pypi.org       → caller MUST provide PYPI_API_TOKEN secret.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: ${{ inputs.repository-url }}
          password: ${{ secrets.PYPI_API_TOKEN || secrets.GITHUB_TOKEN }}
          attestations: ${{ inputs.attestations }}
