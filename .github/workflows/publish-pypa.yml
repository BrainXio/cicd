name: Publish Python Package
# === Consumer reusable workflow ===
# Always call via: uses: brainxio/cicd/.github/workflows/publish-pypa.yml@v1
# Do NOT copy the file unless you intend to fork.

on:
  workflow_call:
    inputs:
      repository-url:
        description: "Package registry URL. Default GitHub Packages (uses GITHUB_TOKEN). For pypi.org use https://upload.pypi.org/legacy/ and provide PYPI_TOKEN. For test.pypi.org use https://test.pypi.org/legacy/ and provide TEST_PYPI_TOKEN."
        type: string
        default: "https://pypi.pkg.github.com/${{ github.repository_owner }}"
    secrets:
      PYPI_TOKEN:
        description: "PyPI API token. Required for pypi.org publishing."
        required: false
      TESTPYPI_TOKEN:
        description: "TestPyPI API token. Required for test.pypi.org publishing."
        required: false

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write  # Required for GitHub Release creation
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync

      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          uv run python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
