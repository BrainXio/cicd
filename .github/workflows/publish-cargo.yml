on:
  workflow_call:
    inputs:
      registry:
        description: "Cargo registry name"
        type: string
        default: "crates-io"
      toolchain:
        description: "Rust toolchain version"
        type: string
        default: "stable"

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
  Pinned actions/checkout@v6 -> actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

  Skipping internal action: brainxio/actions/setup-rust-deps@v1
      - uses: brainxio/actions/setup-rust-deps@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          components: clippy, rustfmt

      - name: Publish crate
        # zizmor: ignore[use-trusted-publishing] — cargo publish requires registry token; trusted publishing not supported by crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CARGO_REGISTRY: ${{ inputs.registry }}
        run: |
          set -euo pipefail
          cargo publish --registry "$CARGO_REGISTRY"
